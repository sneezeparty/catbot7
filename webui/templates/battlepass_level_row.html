{% set row_id = "level-" ~ n ~ "-" ~ i %}
<tr id="{{ row_id }}" class="{% if editing %}editing{% endif %}">
  <td><strong>{{ i + 1 }}</strong></td>
  {% if editing %}
    <td><input class="numeric" name="xp" value="{{ level.xp }}" inputmode="numeric" form="{{ row_id }}-form"></td>
    <td><input name="reward" value="{{ level.reward }}" form="{{ row_id }}-form"></td>
    <td><input class="numeric" name="amount" value="{{ level.amount }}" inputmode="numeric" form="{{ row_id }}-form"></td>
    <td class="actions">
      <form id="{{ row_id }}-form" hx-post="/battlepass/season/{{ n }}/level/{{ i }}" hx-target="#{{ row_id }}" hx-swap="outerHTML"></form>
      <button class="btn btn-primary" type="submit" form="{{ row_id }}-form">Save</button>
      <button class="btn btn-ghost" type="button"
              hx-get="/battlepass/season/{{ n }}/level/{{ i }}/cancel"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Cancel</button>
    </td>
  {% else %}
    <td class="numeric">{{ level.xp }}</td>
    <td>{{ level.reward }}</td>
    <td class="numeric">{{ level.amount }}</td>
    <td class="actions">
      <button class="btn" type="button"
              hx-get="/battlepass/season/{{ n }}/level/{{ i }}/edit"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Edit</button>
    </td>
  {% endif %}
</tr>
