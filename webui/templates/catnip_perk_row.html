{% set row_id = "perk-" ~ i %}
<tr id="{{ row_id }}" class="{% if editing %}editing{% endif %}">
  <td><span class="name">{{ perk.id }}</span></td>
  {% if editing %}
    <td><input name="name" value="{{ perk.name }}" form="{{ row_id }}-form"></td>
    <td><input name="desc" value="{{ perk.desc }}" form="{{ row_id }}-form"></td>
    <td><input class="numeric" name="weight" value="{{ perk.weight }}" form="{{ row_id }}-form" style="width:5em"></td>
    <td>
      {% for v in perk['values'] %}
        <input class="numeric" name="v{{ loop.index0 }}" value="{{ v }}" form="{{ row_id }}-form" style="width:5em">
      {% endfor %}
    </td>
    <td><input type="checkbox" name="exclusive" {% if perk.exclusive %}checked{% endif %} form="{{ row_id }}-form"></td>
    <td class="actions">
      <form id="{{ row_id }}-form" hx-post="/catnip/perk/{{ i }}" hx-target="#{{ row_id }}" hx-swap="outerHTML"></form>
      <button class="btn btn-primary" type="submit" form="{{ row_id }}-form">Save</button>
      <button class="btn btn-ghost" type="button"
              hx-get="/catnip/perk/{{ i }}/cancel"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Cancel</button>
    </td>
  {% else %}
    <td>{{ perk.name }}</td>
    <td><span class="muted">{{ perk.desc|truncate(60) }}</span></td>
    <td class="numeric">{{ perk.weight }}</td>
    <td><span class="muted">{{ perk['values']|join(", ") }}</span></td>
    <td>{% if perk.exclusive %}✓{% endif %}</td>
    <td class="actions">
      <button class="btn" type="button"
              hx-get="/catnip/perk/{{ i }}/edit"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Edit</button>
    </td>
  {% endif %}
</tr>
