{#
  Row for a single tier's complication_pools entry.
  Variables: tier_key, entries_json, editing, just_saved
  Target: #pool-<tier_key>
#}
{% set row_id = "pool-" ~ tier_key %}
<tr id="{{ row_id }}" class="{% if editing %}editing{% endif %}{% if just_saved %} just-saved{% endif %}">
  <td><span class="name">Tier {{ tier_key }}</span></td>
  {% if editing %}
    <td colspan="2">
      <form id="{{ row_id }}-form"
            hx-post="/jobs/complication_pool/{{ tier_key }}"
            hx-target="#{{ row_id }}"
            hx-swap="outerHTML">
        <textarea name="entries_json" rows="12"
                  style="width:100%;font-family:var(--font-mono);font-size:var(--fs-xs)"
                  placeholder='[{"id": "...", "weight": 10, "phase": "post_roll"}]'
        >{{ entries_json }}</textarea>
        <div class="actions" style="margin-top:var(--sp-2)">
          <button class="btn btn-primary" type="submit">Save</button>
          <button class="btn btn-ghost" type="button"
                  hx-get="/jobs/complication_pool/{{ tier_key }}/cancel"
                  hx-target="#{{ row_id }}"
                  hx-swap="outerHTML">Cancel</button>
        </div>
      </form>
    </td>
  {% else %}
    <td>
      <pre style="margin:0;font-family:var(--font-mono);font-size:var(--fs-2xs);white-space:pre-wrap;max-height:8em;overflow:auto">{{ entries_json }}</pre>
    </td>
    <td class="actions">
      <button class="btn" type="button"
              hx-get="/jobs/complication_pool/{{ tier_key }}/edit"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Edit</button>
    </td>
  {% endif %}
</tr>
