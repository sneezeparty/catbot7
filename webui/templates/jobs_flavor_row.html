{#
  Row for a single complication_flavor event_id entry.
  Variables: event_id, lines (list[str]), editing, just_saved
  Target: #flavor-<event_id>
#}
{% set row_id = "flavor-" ~ event_id %}
<tr id="{{ row_id }}" class="{% if editing %}editing{% endif %}{% if just_saved %} just-saved{% endif %}">
  <td><span class="name">{{ event_id }}</span></td>
  {% if editing %}
    <td colspan="2">
      <form id="{{ row_id }}-form"
            hx-post="/jobs/flavor/{{ event_id }}"
            hx-target="#{{ row_id }}"
            hx-swap="outerHTML">
        <textarea name="lines" rows="6"
                  style="width:100%;font-family:var(--font-mono);font-size:var(--fs-xs)"
                  placeholder="One narrative line per entry"
        >{{ lines | join('\n') }}</textarea>
        <div class="actions" style="margin-top:var(--sp-2)">
          <button class="btn btn-primary" type="submit">Save</button>
          <button class="btn btn-ghost" type="button"
                  hx-get="/jobs/flavor/{{ event_id }}/cancel"
                  hx-target="#{{ row_id }}"
                  hx-swap="outerHTML">Cancel</button>
        </div>
      </form>
    </td>
  {% else %}
    <td class="numeric">{{ lines | length }} lines</td>
    <td class="actions">
      <button class="btn" type="button"
              hx-get="/jobs/flavor/{{ event_id }}/edit"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Edit</button>
    </td>
  {% endif %}
</tr>
