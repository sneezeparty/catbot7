{% set row_id = "help-page-" ~ i %}
<tr id="{{ row_id }}" class="{% if editing %}editing{% endif %}{% if just_saved %} just-saved{% endif %}">
  <td class="numeric">{{ i + 1 }}</td>
  {% if editing %}
    <td><input name="title" value="{{ page.title }}" form="{{ row_id }}-form" style="width:16em"></td>
    <td><input class="numeric" name="min_level_to_see" value="{{ page.min_level_to_see }}"
               form="{{ row_id }}-form" style="width:5em" min="0"></td>
    <td>
      <textarea name="body" rows="8" form="{{ row_id }}-form"
                style="width:100%;font-family:var(--font-mono);font-size:var(--fs-xs)"
      >{{ page.body }}</textarea>
    </td>
    <td class="actions">
      <form id="{{ row_id }}-form"
            hx-post="/jobs/help/{{ i }}"
            hx-target="#{{ row_id }}"
            hx-swap="outerHTML"></form>
      <button class="btn btn-primary" type="submit" form="{{ row_id }}-form">Save</button>
      <button class="btn btn-ghost" type="button"
              hx-get="/jobs/help/{{ i }}/cancel"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Cancel</button>
    </td>
  {% else %}
    <td><span class="name">{{ page.title }}</span></td>
    <td class="numeric">{{ page.min_level_to_see }}</td>
    <td><span class="muted">{{ page.body | truncate(120) }}</span></td>
    <td class="actions">
      <button class="btn" type="button"
              hx-get="/jobs/help/{{ i }}/edit"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Edit</button>
    </td>
  {% endif %}
</tr>
