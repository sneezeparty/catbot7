{% set row_id = "narrative-" ~ npc_key %}
<tr id="{{ row_id }}" class="{% if editing %}editing{% endif %}{% if just_saved %} just-saved{% endif %}">
  <td>
    <span class="name">
      {% if npc_key == "_big_score" %}big_score (special){% else %}{{ npc_key }}{% endif %}
    </span>
  </td>
  {% if editing %}
    <td colspan="2">
      <form id="{{ row_id }}-form"
            hx-post="/jobs/narrative/{{ npc_key }}"
            hx-target="#{{ row_id }}"
            hx-swap="outerHTML">
        <textarea name="lines" rows="6" style="width:100%;font-family:var(--font-mono);font-size:var(--fs-xs)"
                  placeholder="One line per entry"
        >{{ lines | join('\n') }}</textarea>
        <div class="actions" style="margin-top:var(--sp-2)">
          <button class="btn btn-primary" type="submit">Save</button>
          <button class="btn btn-ghost" type="button"
                  hx-get="/jobs/narrative/{{ npc_key }}/cancel"
                  hx-target="#{{ row_id }}"
                  hx-swap="outerHTML">Cancel</button>
        </div>
      </form>
    </td>
  {% else %}
    <td class="numeric">{{ lines|length }} lines</td>
    <td class="actions">
      <button class="btn" type="button"
              hx-get="/jobs/narrative/{{ npc_key }}/edit"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Edit</button>
    </td>
  {% endif %}
</tr>
