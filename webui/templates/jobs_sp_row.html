{% set row_id = "sp-" ~ cat_type|replace(" ", "-") %}
<tr id="{{ row_id }}" class="{% if editing %}editing{% endif %}{% if just_saved %} just-saved{% endif %}">
  <td><span class="name">{{ cat_type }}</span></td>
  {% if editing %}
    <td>
      <input class="numeric" name="value" value="{{ value }}"
             form="{{ row_id }}-form" style="width:6em" min="0">
    </td>
    <td class="actions">
      <form id="{{ row_id }}-form"
            hx-post="/jobs/sp/{{ cat_type }}"
            hx-target="#{{ row_id }}"
            hx-swap="outerHTML"></form>
      <button class="btn btn-primary" type="submit" form="{{ row_id }}-form">Save</button>
      <button class="btn btn-ghost" type="button"
              hx-get="/jobs/sp/{{ cat_type }}/cancel"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Cancel</button>
    </td>
  {% else %}
    <td class="numeric">{{ value }}</td>
    <td class="actions">
      <button class="btn" type="button"
              hx-get="/jobs/sp/{{ cat_type }}/edit"
              hx-target="#{{ row_id }}"
              hx-swap="outerHTML">Edit</button>
    </td>
  {% endif %}
</tr>
