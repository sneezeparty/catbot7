{% set k = row.key %}
<tr id="tuning-row-{{ k }}" class="{% if editing %}editing{% endif %}">
  <td><span class="name">{{ k }}</span></td>
  <td>
    {% if editing %}
      <form hx-post="/tuning/scalar/{{ k }}" hx-target="#tuning-row-{{ k }}" hx-swap="outerHTML">
        {% if row.type == "bool" %}
          <select name="value" class="numeric">
            <option value="true"  {% if row.value %}selected{% endif %}>true</option>
            <option value="false" {% if not row.value %}selected{% endif %}>false</option>
          </select>
        {% else %}
          <input class="numeric" name="value" value="{{ row.value }}"
                 {% if row.type == "int" %}inputmode="numeric"{% elif row.type == "float" %}inputmode="decimal"{% endif %}>
        {% endif %}
        {% if row.unit %}<span class="muted">{{ row.unit }}</span>{% endif %}
      </form>
    {% else %}
      <span class="numeric">{{ row.value }}</span>
      {% if row.unit %}<span class="muted">{{ row.unit }}</span>{% endif %}
    {% endif %}
  </td>
  <td><span class="muted">{{ row.label }}</span></td>
  <td class="actions">
    {% if editing %}
      <button class="btn btn-primary" type="button"
              hx-post="/tuning/scalar/{{ k }}"
              hx-include="closest tr form"
              hx-target="#tuning-row-{{ k }}"
              hx-swap="outerHTML">Save</button>
      <button class="btn btn-ghost" type="button"
              hx-get="/tuning/scalar/{{ k }}/cancel"
              hx-target="#tuning-row-{{ k }}"
              hx-swap="outerHTML">Cancel</button>
    {% else %}
      <button class="btn" type="button"
              hx-get="/tuning/scalar/{{ k }}/edit"
              hx-target="#tuning-row-{{ k }}"
              hx-swap="outerHTML">Edit</button>
    {% endif %}
  </td>
</tr>
